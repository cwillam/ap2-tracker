name: Bug Report
description: Melde einen Bug in einem der AP-Tracker (Web, PWA oder Android-App)
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: dropdown
    id: bug-tracker
    attributes:
      label: Welcher Tracker?
      description: Auf welchem Tracker tritt der Bug auf?
      options:
        - AP1 (alle Fachrichtungen)
        - AP2 FIAE (Anwendungsentwicklung)
        - AP2 FISI (Systemintegration)
    validations:
      required: true

  - type: dropdown
    id: bug-device
    attributes:
      label: Gerät
      description: Auf welchem Gerät tritt der Bug auf?
      options:
        - Smartphone
        - Tablet
        - Desktop / Laptop
    validations:
      required: true

  - type: dropdown
    id: bug-install
    attributes:
      label: Installations-Typ
      description: Wie nutzt du den Tracker?
      options:
        - Im Web-Browser (keine Installation)
        - Als PWA installiert (Browser-App)
        - Über Google Play Store (Android-App)
    validations:
      required: true

  - type: input
    id: bug-browser
    attributes:
      label: Browser + Version
      description: z.B. Chrome 120, Firefox 121, Safari 17
      placeholder: Chrome 120
    validations:
      required: true

  - type: input
    id: bug-os
    attributes:
      label: Betriebssystem + Version
      description: z.B. Windows 11, macOS 14, Android 14, iOS 17
      placeholder: Windows 11
    validations:
      required: true

  - type: input
    id: bug-version
    attributes:
      label: Tracker-Version
      description: Welche Version läuft? (steht im Footer, z.B. v2.4.0)
      placeholder: v2.4.0
    validations:
      required: false

  - type: input
    id: bug-url
    attributes:
      label: URL der Seite
      description: Auf welcher Seite trat der Bug auf?
      placeholder: https://ap1.cwillam.de/
    validations:
      required: true

  - type: textarea
    id: bug-steps
    attributes:
      label: Schritte zur Reproduktion
      description: Wie kann man den Bug reproduzieren?
      placeholder: "1. Gehe zu ... 2. Klicke auf ... 3. Siehe Fehler"
    validations:
      required: true

  - type: textarea
    id: bug-expected
    attributes:
      label: Erwartetes Verhalten
      description: Was sollte passieren?
    validations:
      required: true

  - type: textarea
    id: bug-actual
    attributes:
      label: Tatsächliches Verhalten
      description: Was passiert stattdessen?
    validations:
      required: true

  - type: textarea
    id: bug-console
    attributes:
      label: Konsolen-Fehler (optional)
      description: Falls sichtbar: F12 drücken, Tab "Console" öffnen, Fehlermeldung hier einfügen.
    validations:
      required: false

  - type: textarea
    id: bug-screenshots
    attributes:
      label: Screenshots (optional)
      description: Bitte anhängen oder Links einfügen.
    validations:
      required: false
